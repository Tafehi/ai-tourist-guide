included:
  - AISuggestionApp

excluded:
  - .build
  - DerivedData
  - AISuggestionAppTests

disabled_rules:
  - trailing_comma
  - opening_brace

opt_in_rules:
  - empty_count
  - force_unwrapping
  - implicitly_unwrapped_optional
  - private_outlet
  - private_action
  - closure_spacing

line_length:
  warning: 150
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 50
  error: 80

identifier_name:
  min_length: 2
  max_length: 60
