name: LocalLore
options:
  bundleIdPrefix: com.locallore
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

targets:
  LocalLore:
    type: application
    platform: iOS
    sources:
      - LocalLore
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.locallore.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: LocalLore

  LocalLoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LocalLoreTests
    dependencies:
      - target: LocalLore
    settings:
      base:
        SWIFT_VERSION: "5.9"
